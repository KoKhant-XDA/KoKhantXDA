<!DOCTYPE html>
<html>
<head>
  <title>PiUnlocker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #loader {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">Loading PiUnlocker...</div>

<iframe id="siteFrame" src="https://about.piunlocker.com"></iframe>

<script>
  const frame = document.getElementById("siteFrame");
  const loader = document.getElementById("loader");

  frame.onload = () => {
    loader.style.display = "none";
    frame.style.display = "block";
  };
</script>

</body>
</html>
