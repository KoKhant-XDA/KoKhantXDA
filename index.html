<!DOCTYPE html>
<html>
<head>
  <title>PiUnlocker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: monospace;
      color: #00ffcc;
    }

    /* Loader container */
    #loader {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Neon text */
    .text {
      font-size: 22px;
      margin-bottom: 20px;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      0% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
      50% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
      100% { color: #ff9900; text-shadow: 0 0 15px #ff9900; }
    }

    /* Neon progress bar */
    .bar {
      width: 250px;
      height: 6px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px #00ffcc;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #00ff00, #ff9900);
      animation: load 2.5s linear forwards;
      box-shadow: 0 0 15px #00ffcc;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    /* iframe */
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">
  <div class="text">Initializing PiUnlocker...</div>
  <div class="bar">
    <div class="fill"></div>
  </div>
</div>

<iframe id="siteFrame" src="https://about.piunlocker.com"></iframe>

<script>
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("siteFrame").style.display = "block";
  }, 2600);
</script>

</body>
</html>
